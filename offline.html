<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - PCT Class Scheduling</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }

        .card {
            width: min(92vw, 520px);
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 1.2rem 1.1rem;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        .title {
            margin: 0 0 0.35rem;
            font-size: 1.35rem;
            color: #065f46;
        }

        .text {
            margin: 0;
            color: #4b5563;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1 class="title">You are offline</h1>
        <p class="text">PCT Class Scheduling is unavailable right now. Reconnect to the internet or local network, then refresh this page.</p>
    </main>
</body>
</html>
